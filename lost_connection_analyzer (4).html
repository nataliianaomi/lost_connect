<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost Connection — Аналитика</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Trebuchet MS', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
.header { background: #1c1c22; padding: 18px 32px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 17px; font-weight: 600; color: #fff; }
.header-badge { font-size: 11px; background: #2e2e38; color: #9a9aaa; padding: 3px 10px; border-radius: 20px; font-family: monospace; }
.main { padding: 24px 32px; max-width: 1080px; }
.upload-area { background: #fff; border: 2px dashed #d0cfc8; border-radius: 12px; padding: 36px 32px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; margin-bottom: 24px; }
.upload-area:hover { border-color: #5b6af0; background: #f8f8ff; }
.upload-area.loaded { border-style: solid; border-color: #3da85a; background: #f4fbf6; }
.upload-icon { width: 44px; height: 44px; background: #f0f0f8; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; color: #8888bb; }
.upload-icon svg { width: 20px; height: 20px; }
.upload-area.loaded .upload-icon { background: #e8f7ee; color: #3da85a; }
.upload-title { font-size: 15px; font-weight: 600; color: #2a2a2a; margin-bottom: 4px; }
.upload-sub { font-size: 13px; color: #888; }
.upload-area.loaded .upload-title { color: #2a7a40; }
.upload-area.loaded .upload-sub { color: #5a9a6a; }
.progress-wrap { margin-top: 14px; display: none; }
.progress-bar-bg { height: 4px; background: #e8e8e4; border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: #5b6af0; border-radius: 2px; transition: width 0.1s; width: 0%; }
.progress-label { font-size: 11px; color: #888; margin-top: 6px; font-family: monospace; }
.debug-info { font-size: 11px; color: #aaa; margin-top: 6px; font-family: monospace; background: #f8f8f8; padding: 6px 10px; border-radius: 6px; text-align: left; display: none; }
.controls { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; }
.ctrl-group { display: flex; flex-direction: column; gap: 4px; }
.ctrl-group label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: #888; }
input[type="date"], select { background: #fff; border: 1.5px solid #ddd; color: #1a1a1a; padding: 7px 11px; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; cursor: pointer; }
input[type="date"]:focus, select:focus { border-color: #5b6af0; }
.btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; transition: all 0.12s; display: inline-flex; align-items: center; gap: 6px; align-self: flex-end; }
.btn svg { width: 13px; height: 13px; }
.btn-ghost { background: #fff; border-color: #ddd; color: #666; }
.btn-ghost:hover { border-color: #aaa; color: #333; }
.btn-primary { background: #1c1c22; border-color: #1c1c22; color: #fff; }
.btn-primary:hover { background: #2e2e3a; }
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.kpi { background: #fff; border-radius: 10px; padding: 16px 18px; border: 1px solid #e8e8e4; }
.kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #999; margin-bottom: 5px; }
.kpi-value { font-size: 26px; font-weight: 700; color: #1a1a1a; line-height: 1; }
.kpi-sub { font-size: 12px; color: #aaa; margin-top: 3px; }
.kpi.accent .kpi-value { color: #5b6af0; }
.panel { background: #fff; border-radius: 12px; border: 1px solid #e8e8e4; overflow: hidden; margin-bottom: 16px; }
.panel-header { padding: 13px 18px; border-bottom: 1px solid #f0f0ec; display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-size: 12px; font-weight: 700; letter-spacing: 0.05em; color: #444; text-transform: uppercase; }
.panel-count { font-size: 12px; color: #aaa; font-family: monospace; }
.ops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); }
.op-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #f5f5f2; border-right: 1px solid #f5f5f2; }
.op-row.has-lc { background: #fffaf5; }
.op-avatar { width: 28px; height: 28px; border-radius: 50%; background: #ececf2; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #7878aa; flex-shrink: 0; }
.op-row.has-lc .op-avatar { background: #fff0e0; color: #c07820; }
.op-info { flex: 1; min-width: 0; }
.op-name-text { font-size: 12px; font-weight: 600; color: #2a2a2a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.op-bar-wrap { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
.op-bar-bg { flex: 1; height: 3px; background: #ececec; border-radius: 2px; }
.op-bar-fill { height: 100%; background: #e8a040; border-radius: 2px; }
.op-pct { font-size: 10px; color: #bbb; font-family: monospace; min-width: 24px; }
.op-count { font-size: 16px; font-weight: 700; min-width: 24px; text-align: right; color: #ccc; }
.op-row.has-lc .op-count { color: #e8a040; }
.chats-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.chats-table th { text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #999; padding: 9px 14px; border-bottom: 1px solid #f0f0ec; background: #fafaf8; }
.chats-table td { padding: 9px 14px; border-bottom: 1px solid #f5f5f2; }
.chats-table tr:last-child td { border-bottom: none; }
.chats-table tr:hover td { background: #fafaf8; }
.tag-op { display: inline-block; background: #f0f0f8; border-radius: 4px; padding: 1px 6px; font-size: 11px; color: #6666aa; font-weight: 600; margin: 1px; }
.tag-lc { display: inline-block; background: #fff0e0; border-radius: 4px; padding: 1px 6px; font-size: 11px; color: #b07020; font-weight: 600; }
.hidden { display: none; }
.empty { padding: 36px; text-align: center; color: #bbb; font-size: 13px; }
.tabs { display: flex; border-bottom: 1px solid #f0f0ec; padding: 0 18px; }
.tab { padding: 10px 14px; font-size: 12px; font-weight: 600; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
.tab:hover { color: #555; }
.tab.active { color: #1c1c22; border-bottom-color: #1c1c22; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.sort-btn { font-size: 11px; color: #999; background: #f5f5f2; border: 1px solid #e8e8e4; border-radius: 6px; padding: 3px 9px; cursor: pointer; font-family: inherit; font-weight: 600; }
.sort-btn.active { background: #1c1c22; color: #fff; border-color: #1c1c22; }
@media (max-width: 640px) { .main { padding: 14px; } .kpi-row { grid-template-columns: 1fr 1fr; } .ops-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="header">
  <h1>Lost Connection</h1>
  <span class="header-badge">лк-lost_connection / Chatwoot</span>
</div>
<div class="main">
  <div class="upload-area" id="uploadArea">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="upload-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12M8 8l4-4 4 4"/></svg>
    </div>
    <div class="upload-title">Загрузите выгрузку из Chatwoot</div>
    <div class="upload-sub">Перетащите файл или нажмите · .xlsx / .xls</div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
      <div class="progress-label" id="progressLabel">Читаю файл...</div>
    </div>
    <div class="debug-info" id="debugInfo"></div>
  </div>

  <div id="results" class="hidden">
    <div class="controls">
      <div class="ctrl-group"><label>С даты</label><input type="date" id="dateFrom"></div>
      <div class="ctrl-group"><label>По дату</label><input type="date" id="dateTo"></div>
      <div class="ctrl-group"><label>Источник</label><select id="sourceFilter"><option value="">Все источники</option></select></div>
      <button class="btn btn-ghost" id="resetBtn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 8a5 5 0 109.9-1M3 8V4m0 4H7"/></svg>
        Сбросить
      </button>
      <button class="btn btn-primary" id="exportBtn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 10v3h12v-3M8 2v8M5 7l3 3 3-3"/></svg>
        Скачать Excel
      </button>
    </div>
    <div class="kpi-row">
      <div class="kpi accent"><div class="kpi-label">Всего LC</div><div class="kpi-value" id="kpiTotal">0</div><div class="kpi-sub">чатов с тегом</div></div>
      <div class="kpi"><div class="kpi-label">Операторов с LC</div><div class="kpi-value" id="kpiOps">0</div><div class="kpi-sub">из <span id="kpiOpsTotal">0</span> всего</div></div>
      <div class="kpi"><div class="kpi-label">Лидер по LC</div><div class="kpi-value" id="kpiTop" style="font-size:16px;padding-top:4px">—</div><div class="kpi-sub" id="kpiTopCount"></div></div>
      <div class="kpi"><div class="kpi-label">Период</div><div class="kpi-value" id="kpiDays" style="font-size:16px;padding-top:4px">—</div><div class="kpi-sub" id="kpiPeriod"></div></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Операторы</span>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="panel-count" id="opsCountLabel"></span>
          <button class="sort-btn active" id="sortByLC">По LC</button>
          <button class="sort-btn" id="sortByName">А–Я</button>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="grid">Плитка</button>
        <button class="tab" data-tab="list">Список</button>
      </div>
      <div id="tab-grid" class="tab-panel active"><div class="ops-grid" id="opsGrid"></div></div>
      <div id="tab-list" class="tab-panel">
        <table class="chats-table"><thead><tr><th>#</th><th>Оператор</th><th>LC чатов</th><th>Доля</th></tr></thead><tbody id="opsListBody"></tbody></table>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">LC Чаты</span><span class="panel-count" id="chatsCountLabel"></span></div>
      <table class="chats-table">
        <thead><tr><th>ID</th><th>Дата</th><th>Оператор LC</th><th>Все операторы</th><th>Источник</th></tr></thead>
        <tbody id="chatsBody"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
var xlsxLoaded = false;
var allData = [], allOperators = [], sortMode = 'lc';

function loadXLSX(cb) {
  if (xlsxLoaded) { cb(); return; }
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = function() { xlsxLoaded = true; cb(); };
  document.head.appendChild(s);
}

var uploadArea = document.getElementById('uploadArea');
var fileInput  = document.getElementById('fileInput');

uploadArea.addEventListener('click', function() { fileInput.click(); });
uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.classList.add('drag'); });
uploadArea.addEventListener('dragleave', function() { uploadArea.classList.remove('drag'); });
uploadArea.addEventListener('drop', function(e) {
  e.preventDefault(); uploadArea.classList.remove('drag');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', function(e) { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  showProgress(0, 'Загружаю библиотеку...');
  loadXLSX(function() { showProgress(10, 'Читаю файл...'); readFile(file); });
}

function showProgress(pct, label) {
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}

function readFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    showProgress(30, 'Парсю строки...');
    var buf = e.target.result;
    var fname = file.name;
    setTimeout(function() { parseWorkbook(buf, fname); }, 30);
  };
  reader.readAsArrayBuffer(file);
}

function parseWorkbook(buffer, fileName) {
  var wb = XLSX.read(buffer, { type: 'array', cellDates: false, sheetStubs: false });
  var ws = wb.Sheets[wb.SheetNames[0]];
  var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: true });
  showProgress(55, 'Обрабатываю данные...');
  setTimeout(function() { processRows(rows, fileName); }, 30);
}

function processRows(rows, fileName) {
  var opSet  = new Set();
  var srcSet = new Set();
  var lcRows = [];

  if (rows.length < 2) { finalize(lcRows, opSet, srcSet, fileName); return; }

  // --- Auto-detect columns from header ---
  var header = rows[0].map(function(c) { return c ? String(c).trim().toLowerCase() : ''; });

  // Debug: show header info
  var debugEl = document.getElementById('debugInfo');
  debugEl.style.display = 'block';
  debugEl.textContent = 'Заголовки: ' + rows[0].slice(0,15).join(' | ');

  // Operator name columns
  var opCols = [];
  for (var c = 0; c < header.length; c++) {
    var h = header[c];
    if (
      (h.indexOf('ник') >= 0 && h.indexOf('оператор') >= 0) ||
      (h.indexOf('имя') >= 0 && h.indexOf('оператор') >= 0) ||
      h === 'agent' || h === 'assignee' ||
      (h.indexOf('agent') >= 0 && h.indexOf('name') >= 0) ||
      (h.indexOf('operator') >= 0 && h.indexOf('dur') < 0 && h.indexOf('дл') < 0)
    ) { opCols.push(c); }
  }
  if (opCols.length === 0) opCols = [5, 7, 9, 11, 13];

  debugEl.textContent += ' | Столбцы операторов: ' + opCols.join(',');

  // Source column
  var srcCol = 2;
  for (var c = 0; c < header.length; c++) {
    var h = header[c];
    if (h === 'источник' || h === 'source' || h === 'inbox' || h === 'channel') { srcCol = c; break; }
  }

  // Date column
  var dateCol = 1;
  for (var c = 0; c < header.length; c++) {
    var h = header[c];
    if (h.indexOf('дата') >= 0 || h.indexOf('created') >= 0 || h === 'date') { dateCol = c; break; }
  }

  // Category columns
  var catCols = [];
  for (var c = 0; c < header.length; c++) {
    var h = header[c];
    if (h.indexOf('категори') >= 0 || h.indexOf('label') === 0 || h.indexOf('tag') === 0 || h.indexOf('category') === 0) {
      catCols.push(c);
    }
  }
  if (catCols.length === 0) { catCols = []; for (var c = 21; c <= 27; c++) catCols.push(c); }

  // --- Process rows ---
  for (var i = 1; i < rows.length; i++) {
    var row = rows[i];
    if (!row || row.length < 3) continue;

    for (var ci = 0; ci < opCols.length; ci++) {
      var v = row[opCols[ci]];
      if (v && String(v).trim()) opSet.add(String(v).trim());
    }

    var src = row[srcCol] ? String(row[srcCol]).trim() : '';
    if (src) srcSet.add(src);

    var lcCol = -1;
    for (var ci = 0; ci < catCols.length; ci++) {
      var cv = row[catCols[ci]];
      if (cv && String(cv).toLowerCase().indexOf('lost_connection') >= 0) { lcCol = catCols[ci]; break; }
    }
    if (lcCol === -1) continue;

    var ops = opCols.map(function(c) { return row[c] ? String(row[c]).trim() : ''; });
    var lastOp = '';
    for (var oi = ops.length - 1; oi >= 0; oi--) { if (ops[oi]) { lastOp = ops[oi]; break; } }

    var dateRaw = row[dateCol] ? String(row[dateCol]) : '';
    var dateStr = dateRaw.slice(0, 10);
    var dateObj = dateStr ? new Date(dateStr) : null;

    lcRows.push({
      id: row[0],
      date: (dateObj && !isNaN(dateObj)) ? dateObj : null,
      dateStr: dateStr,
      ops: ops,
      lastOp: lastOp,
      src: src
    });
  }

  showProgress(85, 'Строю интерфейс...');
  setTimeout(function() { finalize(lcRows, opSet, srcSet, fileName); }, 30);
}

function finalize(lcRows, opSet, srcSet, fileName) {
  allData      = lcRows;
  allOperators = Array.from(opSet).sort();

  var sel = document.getElementById('sourceFilter');
  sel.innerHTML = '<option value="">Все источники</option>';
  Array.from(srcSet).sort().forEach(function(s) {
    var o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o);
  });

  var dates = lcRows.filter(function(d) { return d.date; }).map(function(d) { return d.date; });
  if (dates.length) {
    document.getElementById('dateFrom').value = new Date(Math.min.apply(null, dates)).toISOString().slice(0,10);
    document.getElementById('dateTo').value   = new Date(Math.max.apply(null, dates)).toISOString().slice(0,10);
  }

  document.getElementById('progressWrap').style.display = 'none';
  uploadArea.classList.add('loaded');
  uploadArea.innerHTML = '<input type="file" id="fileInput2" accept=".xlsx,.xls" style="display:none">'
    + '<div class="upload-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg></div>'
    + '<div class="upload-title">' + fileName + '</div>'
    + '<div class="upload-sub">' + allData.length + ' LC чатов · ' + allOperators.length + ' операторов · нажмите для замены</div>';
  document.getElementById('fileInput2').addEventListener('change', function(e) { if (e.target.files[0]) handleFile(e.target.files[0]); });

  document.getElementById('results').classList.remove('hidden');
  render();
}

function getFiltered() {
  var from = document.getElementById('dateFrom').value;
  var to   = document.getElementById('dateTo').value;
  var src  = document.getElementById('sourceFilter').value;
  return allData.filter(function(d) {
    if (from && d.dateStr < from) return false;
    if (to   && d.dateStr > to)   return false;
    if (src  && d.src !== src)    return false;
    return true;
  });
}

function render() {
  var data = getFiltered();
  var opCounts = {};
  allOperators.forEach(function(op) { opCounts[op] = 0; });
  data.forEach(function(d) { if (d.lastOp) opCounts[d.lastOp] = (opCounts[d.lastOp] || 0) + 1; });

  var withLC   = allOperators.filter(function(op) { return opCounts[op] > 0; });
  var maxCount = Math.max.apply(null, Object.values(opCounts).concat([1]));
  var sorted   = sortMode === 'lc'
    ? allOperators.slice().sort(function(a,b) { return opCounts[b] - opCounts[a]; })
    : allOperators.slice().sort();

  document.getElementById('kpiTotal').textContent    = data.length;
  document.getElementById('kpiOps').textContent      = withLC.length;
  document.getElementById('kpiOpsTotal').textContent = allOperators.length;

  var topOp = sorted.find(function(op) { return opCounts[op] > 0; });
  document.getElementById('kpiTop').textContent      = topOp || '—';
  document.getElementById('kpiTopCount').textContent = topOp ? opCounts[topOp] + ' раз' : '';

  var from = document.getElementById('dateFrom').value;
  var to   = document.getElementById('dateTo').value;
  if (from && to) {
    var days = Math.round((new Date(to) - new Date(from)) / 86400000) + 1;
    document.getElementById('kpiDays').textContent   = days + ' дн.';
    document.getElementById('kpiPeriod').textContent = from + ' — ' + to;
  }

  document.getElementById('opsCountLabel').textContent   = withLC.length + ' с LC · ' + allOperators.length + ' всего';
  document.getElementById('chatsCountLabel').textContent = data.length + ' записей';

  var grid = document.getElementById('opsGrid');
  var frag = document.createDocumentFragment();
  sorted.forEach(function(op) {
    var cnt  = opCounts[op];
    var pct  = data.length ? Math.round(cnt / data.length * 100) : 0;
    var barW = Math.round(cnt / maxCount * 100);
    var init = op.split(' ').map(function(w) { return w[0] || ''; }).join('').slice(0,2).toUpperCase();
    var div  = document.createElement('div');
    div.className = 'op-row' + (cnt > 0 ? ' has-lc' : '');
    div.innerHTML = '<div class="op-avatar">' + init + '</div>'
      + '<div class="op-info"><div class="op-name-text">' + op + '</div>'
      + '<div class="op-bar-wrap"><div class="op-bar-bg"><div class="op-bar-fill" style="width:' + barW + '%"></div></div>'
      + '<span class="op-pct">' + (cnt > 0 ? pct + '%' : '') + '</span></div></div>'
      + '<div class="op-count">' + cnt + '</div>';
    frag.appendChild(div);
  });
  grid.replaceChildren(frag);

  var listFrag = document.createDocumentFragment();
  sorted.forEach(function(op, idx) {
    var cnt = opCounts[op];
    var pct = data.length ? Math.round(cnt / data.length * 100) : 0;
    var tr  = document.createElement('tr');
    tr.innerHTML = '<td style="color:#aaa;font-family:monospace;font-size:11px">' + (idx+1) + '</td>'
      + '<td style="font-weight:600">' + op + '</td>'
      + '<td style="font-size:16px;font-weight:700;color:' + (cnt > 0 ? '#e8a040' : '#ccc') + '">' + cnt + '</td>'
      + '<td style="color:#999;font-size:12px">' + (cnt > 0 ? pct + '%' : '—') + '</td>';
    listFrag.appendChild(tr);
  });
  document.getElementById('opsListBody').replaceChildren(listFrag);

  var chatsBody = document.getElementById('chatsBody');
  var chatsFrag = document.createDocumentFragment();
  var displayData = data.slice().sort(function(a,b) { return (b.date||0)-(a.date||0); });
  var limit = 500;
  displayData.slice(0, limit).forEach(function(d) {
    var opsHtml = d.ops.filter(function(o) { return o; }).map(function(o) { return '<span class="tag-op">' + o + '</span>'; }).join(' ');
    var tr = document.createElement('tr');
    tr.innerHTML = '<td style="font-family:monospace;font-size:11px;color:#aaa">' + d.id + '</td>'
      + '<td style="color:#888">' + d.dateStr + '</td>'
      + '<td><span class="tag-lc">' + (d.lastOp || '—') + '</span></td>'
      + '<td>' + opsHtml + '</td>'
      + '<td style="color:#aaa;font-size:11px">' + d.src + '</td>';
    chatsFrag.appendChild(tr);
  });
  if (displayData.length > limit) {
    var tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="5" style="text-align:center;padding:12px;color:#aaa;font-size:12px">ещё ' + (displayData.length - limit) + ' записей — скачайте Excel</td>';
    chatsFrag.appendChild(tr);
  }
  if (displayData.length === 0) {
    var tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="5" class="empty">Нет данных для выбранных фильтров</td>';
    chatsFrag.appendChild(tr);
  }
  chatsBody.replaceChildren(chatsFrag);
}

document.getElementById('dateFrom').addEventListener('change', render);
document.getElementById('dateTo').addEventListener('change', render);
document.getElementById('sourceFilter').addEventListener('change', render);

document.getElementById('resetBtn').addEventListener('click', function() {
  var dates = allData.filter(function(d) { return d.date; }).map(function(d) { return d.date; });
  if (dates.length) {
    document.getElementById('dateFrom').value = new Date(Math.min.apply(null, dates)).toISOString().slice(0,10);
    document.getElementById('dateTo').value   = new Date(Math.max.apply(null, dates)).toISOString().slice(0,10);
  }
  document.getElementById('sourceFilter').value = '';
  render();
});

document.getElementById('sortByLC').addEventListener('click', function() {
  sortMode = 'lc';
  document.getElementById('sortByLC').classList.add('active');
  document.getElementById('sortByName').classList.remove('active');
  render();
});
document.getElementById('sortByName').addEventListener('click', function() {
  sortMode = 'name';
  document.getElementById('sortByName').classList.add('active');
  document.getElementById('sortByLC').classList.remove('active');
  render();
});

document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

document.getElementById('exportBtn').addEventListener('click', function() {
  var data  = getFiltered();
  var from  = document.getElementById('dateFrom').value;
  var to    = document.getElementById('dateTo').value;
  var today = new Date().toISOString().slice(0,10);

  var opCounts = {};
  allOperators.forEach(function(op) { opCounts[op] = 0; });
  data.forEach(function(d) { if (d.lastOp) opCounts[d.lastOp] = (opCounts[d.lastOp]||0)+1; });

  var wb = XLSX.utils.book_new();
  var s1 = [['Оператор','LC чатов','% от всех LC']];
  allOperators.slice().sort(function(a,b) { return opCounts[b]-opCounts[a]; }).forEach(function(op) {
    var cnt = opCounts[op];
    s1.push([op, cnt, data.length ? Math.round(cnt/data.length*100)+'%' : '0%']);
  });
  s1.push(['ИТОГО', data.length, '100%']);
  var ws1 = XLSX.utils.aoa_to_sheet(s1);
  ws1['!cols'] = [{wch:20},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws1, 'ReportTable');

  var s2 = [['ID чата','Дата','Оператор LC','Все операторы','Источник']];
  data.slice().sort(function(a,b) { return a.dateStr.localeCompare(b.dateStr); }).forEach(function(d) {
    s2.push([d.id, d.dateStr, d.lastOp||'—', d.ops.filter(function(o){return o;}).join(', '), d.src]);
  });
  var ws2 = XLSX.utils.aoa_to_sheet(s2);
  ws2['!cols'] = [{wch:10},{wch:14},{wch:18},{wch:40},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws2, 'LC Чаты');

  var period = (from && to) ? from+'_'+to : today;
  XLSX.writeFile(wb, 'LC_Report_' + period + '.xlsx');
});
</script>
</body>
</html>
